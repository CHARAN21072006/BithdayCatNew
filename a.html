<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🐱</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ffd6ec,#ffe8b6);
text-align:center;
margin:0;
overflow-x:hidden;
}

h1{
margin-top:40px;
font-size:40px;
color:#ff4d88;
}

.cat{
font-size:80px;
position:absolute;
transition:0.1s;
}

.card{
background:white;
width:320px;
margin:40px auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
background:#ff4d88;
border:none;
color:white;
padding:12px 18px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff2a6d;
}

#secret{
display:none;
margin-top:15px;
font-size:18px;
color:#444;
}

.cake{
font-size:70px;
cursor:pointer;
}

.confetti{
position:fixed;
font-size:20px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<h1>🐱 Happy Birthday!</h1>

<div class="card">
<p>Our birthday cat prepared something for you 🎉</p>

<div class="cake" onclick="cakeClick()">🎂</div>
<p>Click the cake!</p>

<button onclick="showMessage()">Open Birthday Gift 🎁</button>

<div id="secret">
🎉 Surprise!  
<br><br>
You are officially promoted to  
<b>Supreme Cat Commander of Cake!</b> 🐱🍰
<br><br>
Have the most pawsome birthday ever!
</div>

</div>

<div class="cat" id="cat">🐱</div>

<script>

const cat=document.getElementById("cat");

document.addEventListener("mousemove",e=>{
cat.style.left=e.pageX+10+"px";
cat.style.top=e.pageY+10+"px";
});

function showMessage(){
document.getElementById("secret").style.display="block";
confetti();
}

function cakeClick(){
alert("The birthday cake is delicious! 🎂🐱");
confetti();
}

function confetti(){
for(let i=0;i<25;i++){
let conf=document.createElement("div");
conf.innerHTML="🎉";
conf.className="confetti";
conf.style.left=Math.random()*100+"vw";
conf.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(conf);

setTimeout(()=>conf.remove(),3000);
}
}

</script>

</body>
</html>
